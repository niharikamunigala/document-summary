<!DOCTYPE html>
<html>
<head>
    <title>Document Upload Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        #fileInput {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Document Upload & OCR Test</h1>
        
        <p><strong>Test the upload process with OCR and AI summarization</strong></p>
        
        <div>
            <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.bmp,.tiff">
            <button onclick="uploadFile()">Upload Document</button>
        </div>
        
        <div id="status"></div>
        <div id="result"></div>
    </div>

    <script>
        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function updateResult(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<pre>${message}</pre>`;
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                updateStatus('❌ Please select a file first', 'error');
                return;
            }

            updateStatus('📤 Uploading and processing document...', 'info');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('http://localhost:5000/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    updateStatus(`❌ Error: ${data.error}`, 'error');
                    updateResult(`Error Details:\n${JSON.stringify(data, null, 2)}`);
                    return;
                }

                // Success
                let successMsg = '✅ Document processed successfully!\n\n';
                
                if (data.fallback) {
                    successMsg += '⚠️ FALLBACK MODE: Invalid Grok API Key\n\n';
                    successMsg += `Message: ${data.message}\n\n`;
                    successMsg += 'To enable AI summarization:\n';
                    successMsg += '1. Go to: https://console.x.ai\n';
                    successMsg += '2. Get a valid API key\n';
                    successMsg += '3. Update: backend/.env\n';
                    successMsg += '4. Restart server\n\n';
                } else {
                    successMsg += '✅ AI Summarization completed!\n\n';
                }

                successMsg += `Document ID: ${data.documentId}\n\n`;
                successMsg += `Summary:\n${data.summary}`;

                updateStatus(`✅ Upload Complete! ${data.fallback ? '(Fallback Mode)' : '(AI Summarization Enabled)'}`, 
                            data.fallback ? 'error' : 'success');
                updateResult(successMsg);

            } catch (error) {
                updateStatus(`❌ Error: ${error.message}`, 'error');
                updateResult(`Connection Error:\nMake sure the backend server is running on port 5000\n\nError: ${error.message}`);
            }
        }
    </script>
</body>
</html>
